<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تواصل معنا | نور تك</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container navbar">
      <div class="logo">نور<span>تك</span></div>
      <nav>
        <a href="index.html">الرئيسية</a>
        <a href="about.html">من نحن</a>
        <a href="services.html">خدماتنا</a>
        <a href="contact.html">تواصل معنا</a>
      </nav>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <h1>تواصل معنا</h1>
    </div>
  </section>

  <section class="content">
    <div class="container">
      <form class="contact-form" onsubmit="handleSubmit(event)">
        <label for="name">الاسم</label>
        <input type="text" id="name" name="name" required>

        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" name="email" required>

        <label for="message">الرسالة</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit" class="btn">إرسال</button>
      </form>
      <p id="formResult"></p>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2026 نور تك. جميع الحقوق محفوظة.</p>
    </div>
  </footer>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('formResult').innerText = 'شكرًا! تم استلام رسالتك (نموذج تجريبي بدون سيرفر).';
    }
  </script>
</body>
</html>
